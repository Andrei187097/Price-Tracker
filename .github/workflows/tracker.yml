name: Price Tracker

on:
  schedule:
    - cron: '0 * * * *'   # Se ejecuta al inicio de cada hora
  workflow_dispatch:       # Permite lanzarlo manualmente para probar

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # Necesario para guardar el último precio en el repo

    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4

      - name: Ejecutar el tracker
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}  # Viene de los secretos de GitHub
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python tracker.py

      - name: Guardar el precio actualizado en el repositorio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_price.json
          git diff --staged --quiet || git commit -m "Update last price"
          git push
